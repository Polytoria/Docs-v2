Name: Game
BaseType: Instance
Properties:
  - Name: IsLocalTest
    Type: boolean
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Returns true if this current session is being tested locally
  - Name: GameID
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: The ID of the current Polytoria place.
  - Name: ServerID
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: The server ID of the current instance.
  - Name: UpTime
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: The uptime of this game in seconds.
  - Name: ServerTime
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: A synchronized clock that represents the server's current time.
  - Name: InstanceCount
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: The total number of instances currently loaded.
Methods: []
Events:
  - Name: Ready
    Parameters: null
    Description: Fires when the game is ready
    Arguments: ""
  - Name: Rendered
    Parameters:
      - Name: number
        Type: number
        IsOptional: false
        DefaultValue: null
    Description: Fires every frame after the place has been rendered. The `delta`
      parameter is the time between the last frame and the current.
    Arguments:
      Name: delta
      Type: number
IsStatic: true
IsAbstract: false
IsInstantiatable: false
StaticAlias: game
Description: Game is the root object in the Polytoria instance tree. It is the
  object from which everything is descended.
